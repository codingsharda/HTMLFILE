c<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Clone Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>JiraClone</h2>

        <ul>
            <li><i class="fa fa-home"></i> Dashboard</li>
            <li><i class="fa fa-tasks"></i> My Tasks</li>
            <li><i class="fa fa-folder"></i> Projects</li>
            <li><i class="fa fa-bug"></i> Issues</li>
            <li><i class="fa fa-chart-line"></i> Reports</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main">

        <header>
            <h1>Good Morning, Anurag 👋</h1>
            <button>Create Issue</button>
        </header>

        <!-- Stats -->
        <section class="stats">

            <div class="card">
                <h3>Open Issues</h3>
                <p>128</p>
            </div>

            <div class="card">
                <h3>In Progress</h3>
                <p>45</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p>275</p>
            </div>

            <div class="card">
                <h3>Projects</h3>
                <p>8</p>
            </div>

        </section>

        <!-- Kanban Board -->
        <section class="board">

            <div class="column">
                <h2>To Do</h2>

                <div class="task">
                    Login Page Design
                </div>

                <div class="task">
                    API Integration
                </div>
            </div>

            <div class="column">
                <h2>In Progress</h2>

                <div class="task">
                    Dashboard UI
                </div>
            </div>

            <div class="column">
                <h2>Done</h2>

                <div class="task">
                    Project Setup
                </div>
            </div>

        </section>

    </main>

</div>
<script src="script.js"></script>
</body>
</html>
